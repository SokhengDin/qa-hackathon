<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cambria Shop — Home</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="min-h-screen bg-neutral-50 text-neutral-900">
  <header class="sticky top-0 z-10 border-b border-neutral-200 bg-white/80 backdrop-blur-sm">
    <div class="mx-auto flex max-w-3xl items-center justify-between px-6 py-4">
      <a href="/" class="flex items-center gap-2 text-lg font-semibold text-neutral-900">
        <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-brand text-white">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l3.6-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17M17 13v4a2 2 0 01-2 2H9a2 2 0 01-2-2v-4m10 0H7" />
          </svg>
        </span>
        Cambria Shop
      </a>
      <a href="/cart.html" class="relative flex items-center gap-1.5 text-sm font-medium text-neutral-600 transition-colors hover:text-brand" data-testid="cart-link">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l3.6-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17M17 13v4a2 2 0 01-2 2H9a2 2 0 01-2-2v-4m10 0H7" />
        </svg>
        Cart
        <span id="cart-count-badge" class="hidden h-5 min-w-5 items-center justify-center rounded-full bg-brand px-1 text-xs font-semibold text-white" data-testid="cart-count"></span>
      </a>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-6 py-10">
    <div class="mb-8">
      <h1 class="text-2xl font-semibold tracking-tight">Products</h1>
      <p class="mt-1 text-sm text-neutral-500">Everything you need, nothing you don't.</p>
    </div>

    <div id="product-grid" class="grid grid-cols-1 gap-5 sm:grid-cols-2"></div>
  </main>

  <script src="/app.js"></script>
  <script src="/pages/home.js"></script>
</body>
</html>

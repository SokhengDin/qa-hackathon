{% extends "base.html" %}
{% block title %}Order confirmed — Cambria Shop{% endblock %}
{% block content %}
  <div class="rounded-2xl border border-neutral-200 bg-white p-10 text-center shadow-card" data-testid="order-confirmation">
    <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-brand/10">
      <svg class="h-8 w-8 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
    </div>
    <h1 class="mt-5 text-2xl font-semibold tracking-tight">Order confirmed</h1>
    <p class="mt-2 text-neutral-500">Thanks for your purchase — a confirmation has been sent to your email.</p>
    <p class="mt-6 text-3xl font-semibold tracking-tight" data-testid="order-total">${{ "%.2f"|format(order_total) }}</p>
    <a
      href="/"
      class="mt-8 inline-flex items-center gap-2 rounded-lg border border-neutral-300 px-5 py-2.5 text-sm font-medium hover:border-brand"
    >
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
      Continue shopping
    </a>
  </div>
{% endblock %}
